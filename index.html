<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BKG Killer App Command Center v3</title>
    <!-- build: bkg-killer-app-v3-2026-04-15 -->

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

    <!-- React 18 UMD -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --ink: #1B3A5C;
            --ink-light: #5A7A9A;
            --ink-muted: #8FA4B8;
            --accent: #2B6CB0;
            --accent-light: #4A90D9;
            --bg-sky: #FAFCFF;
            --bg-cream: #FDF8F0;
            --bg-card: #FFFFFF;
            --bg-hover: #F0F6FF;
            --bg-selected: #E8F1FD;
            --border: #D4DEE8;
            --border-subtle: #E8EFF5;
            --green: #1D9E75;
            --yellow: #D4A017;
            --red: #DC3545;
            --gold: #C4A44A;
            --purple: #7F77DD;
            --orange: #E07C3A;
            --brown: #8B5E3C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-sky);
            color: var(--ink);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        code, pre {
            font-family: 'IBM Plex Mono', monospace;
        }

        /* Main Container */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg-sky);
        }

        /* Header */
        .app-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-subtle);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 3px rgba(27, 58, 92, 0.08);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--ink);
        }

        .project-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .project-dropdown {
            background: var(--bg-sky);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            color: var(--ink);
            cursor: pointer;
            min-width: 200px;
            transition: all 0.2s ease;
        }

        .project-dropdown:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .new-project-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .new-project-btn:hover {
            background: var(--accent-light);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .progress-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .progress-bar-small {
            width: 120px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--green);
            transition: width 0.3s ease;
        }

        .xp-badge {
            background: var(--gold);
            color: white;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .rank-badge {
            font-size: 12px;
            color: var(--ink-light);
            font-weight: 500;
        }

        /* Journey Map */
        .journey-section {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-subtle);
            padding: 20px 24px;
            overflow-x: auto;
        }

        .journey-map {
            display: flex;
            gap: 24px;
            align-items: center;
            min-width: min-content;
        }

        .journey-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 80px;
        }

        .journey-node.active .node-circle {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.2);
        }

        .node-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-hover);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s ease;
        }

        .journey-node:hover .node-circle {
            border-color: var(--accent);
        }

        .node-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-light);
            text-align: center;
        }

        .journey-node.active .node-label {
            color: var(--accent);
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        /* Left Column - Quest List */
        .quest-list-panel {
            width: 340px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-subtle);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .quest-list-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--ink-muted);
            letter-spacing: 0.5px;
        }

        .quest-list-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .level-group {
            margin-bottom: 16px;
        }

        .level-group-header {
            padding: 12px 16px 8px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--ink-muted);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s ease;
        }

        .level-group-header:hover {
            color: var(--ink-light);
        }

        .quest-item {
            padding: 12px 16px;
            margin: 0 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .quest-item:hover {
            background: var(--bg-hover);
        }

        .quest-item.active {
            background: var(--bg-selected);
            border-left-color: var(--accent);
        }

        .quest-item.not-started {
            border-left-color: var(--ink-muted);
        }

        .quest-item.in-progress {
            border-left-color: var(--yellow);
        }

        .quest-item.complete {
            border-left-color: var(--green);
        }

        .quest-status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .quest-status-indicator.not-started {
            background: var(--ink-muted);
        }

        .quest-status-indicator.in-progress {
            background: var(--yellow);
        }

        .quest-status-indicator.complete {
            background: var(--green);
        }

        .quest-item-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--ink);
            flex: 1;
        }

        .quest-item-xp {
            font-size: 11px;
            color: var(--ink-muted);
            font-weight: 600;
        }

        /* Right Panel - Detail */
        .detail-panel {
            flex: 1;
            background: var(--bg-sky);
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .detail-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--ink-light);
        }

        .detail-empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .detail-empty-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .detail-quest-header {
            margin-bottom: 24px;
        }

        .detail-quest-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .detail-quest-meta {
            font-size: 14px;
            color: var(--ink-light);
            display: flex;
            gap: 16px;
        }

        .detail-progress-message {
            font-size: 14px;
            color: var(--accent);
            font-weight: 500;
            margin-top: 8px;
            padding: 12px;
            background: rgba(43, 108, 176, 0.08);
            border-radius: 6px;
            border-left: 3px solid var(--accent);
        }

        .step-card {
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 3px solid var(--ink-muted);
            transition: all 0.3s ease;
            box-shadow: 0 1px 2px rgba(27, 58, 92, 0.04);
            overflow: hidden;
        }

        .step-card.in-progress {
            border-left-color: var(--yellow);
        }

        .step-card.complete {
            border-left-color: var(--green);
            background: rgba(29, 158, 117, 0.04);
        }

        .step-card-header {
            padding: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none;
            transition: background 0.2s ease;
        }

        .step-card-header:hover {
            background: var(--bg-hover);
        }

        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--ink);
            flex-shrink: 0;
        }

        .step-card.complete .step-number {
            background: var(--green);
            color: white;
        }

        .step-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
            flex: 1;
        }

        .step-badges {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .step-status-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .step-status-badge.not-started {
            background: var(--ink-muted);
            color: white;
        }

        .step-status-badge.in-progress {
            background: var(--yellow);
            color: white;
        }

        .step-status-badge.complete {
            background: var(--green);
            color: white;
        }

        .step-xp-badge {
            background: var(--gold);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .step-expand-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink-light);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .step-card.expanded .step-expand-icon {
            transform: rotate(180deg);
        }

        .step-content {
            padding: 0 16px 16px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .step-card.expanded .step-content {
            max-height: 1000px;
        }

        .step-input-group {
            margin-bottom: 12px;
        }

        .step-input-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 8px;
            display: block;
        }

        .step-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: var(--ink);
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s ease;
        }

        .step-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1);
        }

        .step-textarea::placeholder {
            color: var(--ink-muted);
        }

        .voice-input-container {
            position: relative;
        }

        .voice-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s ease;
        }

        .voice-btn:hover {
            background: var(--accent-light);
        }

        .location-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .step-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            color: var(--ink);
            transition: border-color 0.2s ease;
        }

        .step-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1);
        }

        .step-input::placeholder {
            color: var(--ink-muted);
        }

        .step-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            color: var(--ink);
            cursor: pointer;
            background: white;
            transition: border-color 0.2s ease;
        }

        .step-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .file-upload-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-sky);
        }

        .file-upload-zone:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .file-upload-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .file-upload-text {
            font-size: 13px;
            color: var(--ink-light);
            margin-bottom: 4px;
        }

        .file-upload-hint {
            font-size: 12px;
            color: var(--ink-muted);
        }

        .file-selected-state {
            background: rgba(29, 158, 117, 0.08);
            border-color: var(--green);
            padding: 16px;
            text-align: center;
        }

        .file-selected-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .file-selected-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--green);
        }

        .radio-group, .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-option, .checkbox-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .radio-option:hover, .checkbox-option:hover {
            background: var(--bg-hover);
        }

        .radio-input, .checkbox-input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        .option-label {
            font-size: 13px;
            color: var(--ink);
            flex: 1;
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .template-card {
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-card);
        }

        .template-card:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .template-card.selected {
            border-color: var(--green);
            background: rgba(29, 158, 117, 0.08);
        }

        .template-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .template-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 4px;
        }

        .template-desc {
            font-size: 12px;
            color: var(--ink-light);
            line-height: 1.4;
        }

        .analysis-result-box {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }

        .analysis-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .analysis-result-text {
            font-size: 13px;
            line-height: 1.6;
            color: var(--ink);
            margin-bottom: 12px;
        }

        .analysis-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            color: var(--accent);
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .run-analysis-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            width: 100%;
        }

        .run-analysis-btn:hover {
            background: var(--accent-light);
        }

        .run-analysis-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .checklist-item:hover {
            background: var(--bg-hover);
        }

        .checklist-input {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--green);
            flex-shrink: 0;
        }

        .checklist-label {
            font-size: 13px;
            color: var(--ink);
            flex: 1;
            cursor: pointer;
        }

        .step-footer {
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
            margin-top: 12px;
        }

        .skip-button {
            background: none;
            border: none;
            color: var(--ink-light);
            font-size: 13px;
            cursor: pointer;
            padding: 0;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .skip-button:hover {
            color: var(--ink);
        }

        .step-card.skipped {
            opacity: 0.6;
        }

        .step-card.skipped .step-label {
            text-decoration: line-through;
        }

        /* Animations */
        @keyframes completionFlash {
            0% {
                border-left-color: var(--yellow);
            }
            50% {
                border-left-color: var(--green);
            }
            100% {
                border-left-color: var(--green);
            }
        }

        @keyframes xpFloatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-40px);
            }
        }

        .step-card.completing {
            animation: completionFlash 0.6s ease;
        }

        .xp-float {
            position: fixed;
            font-weight: 700;
            color: var(--green);
            font-size: 16px;
            pointer-events: none;
            animation: xpFloatUp 1s ease-out forwards;
        }

        /* Homepage */
        .homepage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-sky) 0%, var(--bg-cream) 100%);
            padding: 40px 20px;
            text-align: center;
        }

        .homepage-header {
            margin-bottom: 40px;
        }

        .homepage-logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .homepage-title {
            font-size: 48px;
            font-weight: 800;
            color: var(--ink);
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .homepage-subtitle {
            font-size: 20px;
            color: var(--ink-light);
            margin-bottom: 32px;
            max-width: 600px;
        }

        .blueprint-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(43, 108, 176, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(43, 108, 176, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        .homepage-content {
            position: relative;
            z-index: 1;
            max-width: 1000px;
        }

        .tool-silhouettes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 24px;
            margin: 40px 0;
            justify-items: center;
        }

        .tool-icon {
            font-size: 64px;
            margin-bottom: 12px;
        }

        .tool-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
        }

        .stats-section {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: var(--accent);

        // ============================================
        // XP & RANK SYSTEM
        // ============================================

        const RANK_TIERS = [
            { rank: 'Apprentice', minXP: 0, maxXP: 499 },
            { rank: 'Journeyman', minXP: 500, maxXP: 1999 },
            { rank: 'Craftsman', minXP: 2000, maxXP: 4999 },
            { rank: 'Master', minXP: 5000, maxXP: 14999 },
            { rank: 'Architect', minXP: 15000, maxXP: Infinity },
        ];

        function getRankForXP(xp) {
            const tier = RANK_TIERS.find(t => xp >= t.minXP && xp <= t.maxXP);
            return tier ? tier.rank : 'Apprentice';
        }

        // ============================================
        // MAIN APP
        // ============================================

        function App() {
            const [showHomepage, setShowHomepage] = useState(true);
            const [projects, setProjects] = useState([
                {
                    id: 'proj-default',
                    name: 'My First Project',
                    stepStates: {},
                },
            ]);
            const [currentProjectId, setCurrentProjectId] = useState('proj-default');
            const [selectedQuestId, setSelectedQuestId] = useState(null);
            const [expandedSteps, setExpandedSteps] = useState({});
            const [xpFloats, setXpFloats] = useState([]);

            const currentProject = useMemo(
                () => projects.find(p => p.id === currentProjectId) || projects[0],
                [projects, currentProjectId]
            );

            const totalXP = useMemo(() => {
                if (!currentProject.stepStates) return 0;
                let xp = 0;
                QUESTS_DATA.forEach(quest => {
                    quest.steps.forEach(step => {
                        if (currentProject.stepStates[step.id]?.completed) {
                            xp += Math.ceil(quest.totalXP / quest.steps.length);
                        }
                    });
                });
                return xp;
            }, [currentProject]);

            const totalProjectXP = useMemo(() => {
                let total = 0;
                QUESTS_DATA.forEach(quest => {
                    total += quest.totalXP;
                });
                return total;
            }, []);

            const overallCompletionPercent = useMemo(() => {
                if (totalProjectXP === 0) return 0;
                const totalSteps = QUESTS_DATA.reduce((sum, q) => sum + q.steps.length, 0);
                const completedSteps = Object.values(currentProject.stepStates || {}).filter(s => s.completed).length;
                return Math.round((completedSteps / totalSteps) * 100);
            }, [currentProject, totalProjectXP]);

            const rank = useMemo(() => getRankForXP(totalXP), [totalXP]);

            // Create new project
            const createProject = useCallback(() => {
                const name = prompt('Project name:');
                if (!name) return;
                const newProj = {
                    id: 'proj-' + Date.now(),
                    name,
                    stepStates: {},
                };
                setProjects(prev => [...prev, newProj]);
                setCurrentProjectId(newProj.id);
            }, []);

            // Update step state
            const updateStepState = useCallback((stepId, updates) => {
                setProjects(prev => prev.map(p => {
                    if (p.id !== currentProjectId) return p;
                    const stepStates = { ...p.stepStates };
                    stepStates[stepId] = { ...stepStates[stepId], ...updates };
                    return { ...p, stepStates };
                }));
            }, [currentProjectId]);

            // Complete step
            const completeStep = useCallback((stepId, quest) => {
                updateStepState(stepId, { completed: true, status: 'complete' });

                // XP award
                const xpAmount = Math.ceil(quest.totalXP / quest.steps.length);
                const rect = document.querySelector(`[data-step-id="${stepId}"]`)?.getBoundingClientRect();
                if (rect) {
                    const float = {
                        id: Math.random(),
                        x: rect.left + rect.width / 2,
                        y: rect.top,
                        text: `+${xpAmount} XP`,
                    };
                    setXpFloats(prev => [...prev, float]);
                    setTimeout(() => {
                        setXpFloats(prev => prev.filter(f => f.id !== float.id));
                    }, 1000);
                }
            }, [updateStepState]);

            // Handle step input changes
            const handleStepInput = useCallback((stepId, value, quest) => {
                let status = 'in-progress';
                let isCompleted = false;

                const step = quest.steps.find(s => s.id === stepId);
                if (!step) return;

                switch (step.type) {
                    case 'text_input':
                        isCompleted = value && value.trim().length >= 10;
                        break;
                    case 'voice_input':
                        isCompleted = value && value.trim().length >= 10;
                        break;
                    case 'number_input':
                        isCompleted = value && parseFloat(value) > 0;
                        break;
                    case 'location_input':
                        const state = currentProject.stepStates[stepId] || {};
                        isCompleted = (state.city && state.state) || (value && value.split('|')[0] && value.split('|')[1]);
                        break;
                    case 'checklist':
                        isCompleted = value === true;
                        break;
                    default:
                        break;
                }

                updateStepState(stepId, {
                    status,
                    value,
                    ...(isCompleted && { completed: true, status: 'complete' }),
                });

                if (isCompleted && !currentProject.stepStates[stepId]?.completed) {
                    completeStep(stepId, quest);
                }
            }, [currentProject, updateStepState, completeStep]);

            // Calculate quest status
            function getQuestStatus(quest) {
                const completedSteps = quest.steps.filter(step => currentProject.stepStates[step.id]?.completed).length;
                if (completedSteps === 0) return 'not-started';
                if (completedSteps === quest.steps.length) return 'complete';
                return 'in-progress';
            }

            // Get progress message
            function getProgressMessage(quest) {
                const completedSteps = quest.steps.filter(step => currentProject.stepStates[step.id]?.completed).length;
                const totalSteps = quest.steps.length;
                const percent = Math.round((completedSteps / totalSteps) * 100);

                if (percent === 0) return 'Ready when you are';
                if (percent <= 25) return 'Great start! Keep the momentum going';
                if (percent <= 50) return 'Halfway to mastering this phase';
                if (percent <= 75) return "You're on fire! Almost there";
                if (percent < 100) return 'Just a few more steps to complete mastery';
                const questXP = quest.totalXP;
                return `🏆 Quest Complete! You've earned ${questXP} XP`;
            }

            if (showHomepage) {
                return <Homepage onStart={() => setShowHomepage(false)} />;
            }

            return (
                <div className="app-container">
                    {/* Header */}
                    <div className="app-header">
                        <div className="header-left">
                            <div className="header-logo">🏗️ BKG Killer App</div>
                            <div className="project-selector">
                                <select
                                    className="project-dropdown"
                                    value={currentProjectId}
                                    onChange={e => setCurrentProjectId(e.target.value)}
                                >
                                    {projects.map(p => {
                                        const projSteps = QUESTS_DATA.reduce((sum, q) => sum + q.steps.length, 0);
                                        const projCompleted = Object.values(p.stepStates || {}).filter(s => s.completed).length;
                                        const projPercent = Math.round((projCompleted / projSteps) * 100);
                                        return (
                                            <option key={p.id} value={p.id}>
                                                {p.name} ({projPercent}%)
                                            </option>
                                        );
                                    })}
                                    <option value="">➕ New Project</option>
                                </select>
                                {currentProjectId === '' && (() => { createProject(); setCurrentProjectId(projects[projects.length - 1].id); })()}
                            </div>
                            <button className="new-project-btn" onClick={createProject}>
                                ➕ New
                            </button>
                        </div>

                        <div className="header-right">
                            <div className="progress-info">
                                <div className="progress-bar-small">
                                    <div className="progress-bar-fill" style={{ width: `${overallCompletionPercent}%` }}></div>
                                </div>
                                <span>{overallCompletionPercent}%</span>
                            </div>
                            <div className="xp-badge">{totalXP} XP</div>
                            <div className="rank-badge">{rank}</div>
                        </div>
                    </div>

                    {/* Journey Map */}
                    <div className="journey-section">
                        <div className="journey-map">
                            {LEVEL_NAMES.map((level, idx) => (
                                <div key={level.id} className="journey-node">
                                    <div className="node-circle">{level.emoji}</div>
                                    <div className="node-label">{level.name}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="main-content">
                        {/* Left Column - Quest List */}
                        <div className="quest-list-panel">
                            <div className="quest-list-header">Quests</div>
                            <div className="quest-list-content">
                                {LEVEL_NAMES.map(level => {
                                    const levelQuests = QUESTS_DATA.filter(q => q.level === level.id);
                                    return (
                                        <div key={level.id} className="level-group">
                                            <div className="level-group-header">
                                                {level.emoji} {level.name}
                                            </div>
                                            {levelQuests.map(quest => {
                                                const status = getQuestStatus(quest);
                                                return (
                                                    <div
                                                        key={quest.id}
                                                        className={`quest-item ${status} ${selectedQuestId === quest.id ? 'active' : ''}`}
                                                        onClick={() => setSelectedQuestId(quest.id)}
                                                    >
                                                        <div className={`quest-status-indicator ${status}`}></div>
                                                        <div className="quest-item-label">{quest.label}</div>
                                                        <div className="quest-item-xp">{quest.totalXP} XP</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Right Panel - Detail */}
                        <div className="detail-panel">
                            {!selectedQuestId ? (
                                <div className="detail-empty">
                                    <div className="detail-empty-icon">📋</div>
                                    <div className="detail-empty-text">Select a quest to begin</div>
                                    <div style={{ fontSize: '13px', color: 'var(--ink-muted)' }}>
                                        Choose a quest from the list to start working
                                    </div>
                                </div>
                            ) : (() => {
                                const quest = QUESTS_DATA.find(q => q.id === selectedQuestId);
                                if (!quest) return null;

                                const status = getQuestStatus(quest);
                                const progressMsg = getProgressMessage(quest);
                                const level = LEVEL_NAMES.find(l => l.id === quest.level);

                                return (
                                    <div>
                                        <div className="detail-quest-header">
                                            <div className="detail-quest-title">
                                                {level?.emoji} {quest.label}
                                            </div>
                                            <div className="detail-quest-meta">
                                                <span>{quest.totalXP} XP • {quest.steps.length} steps</span>
                                            </div>
                                            <div className="detail-progress-message">{progressMsg}</div>
                                        </div>

                                        {quest.steps.map((step, idx) => (
                                            <StepCard
                                                key={step.id}
                                                step={step}
                                                stepNumber={idx + 1}
                                                quest={quest}
                                                stepState={currentProject.stepStates[step.id] || {}}
                                                onInputChange={handleStepInput}
                                                isExpanded={expandedSteps[step.id] || false}
                                                onToggleExpand={() => {
                                                    setExpandedSteps(prev => ({
                                                        ...prev,
                                                        [step.id]: !prev[step.id],
                                                    }));
                                                }}
                                                onComplete={() => completeStep(step.id, quest)}
                                            />
                                        ))}
                                    </div>
                                );
                            })()}
                        </div>
                    </div>

                    {/* XP Floats */}
                    {xpFloats.map(float => (
                        <div
                            key={float.id}
                            className="xp-float"
                            style={{
                                left: float.x + 'px',
                                top: float.y + 'px',
                            }}
                        >
                            {float.text}
                        </div>
                    ))}
                </div>
            );
        }

        // ============================================
        // STEP CARD COMPONENT
        // ============================================

        function StepCard({
            step,
            stepNumber,
            quest,
            stepState,
            onInputChange,
            isExpanded,
            onToggleExpand,
            onComplete,
        }) {
            const status = stepState.completed ? 'complete' : (stepState.status || 'not-started');
            const xpAmount = Math.ceil(quest.totalXP / quest.steps.length);

            return (
                <div
                    className={`step-card ${status} ${isExpanded ? 'expanded' : ''}`}
                    data-step-id={step.id}
                >
                    <div className="step-card-header" onClick={onToggleExpand}>
                        <div className="step-number">{stepNumber}</div>
                        <div className="step-label">{step.label}</div>
                        <div className="step-badges">
                            {status !== 'not-started' && (
                                <div className={`step-status-badge ${status}`}>
                                    {status === 'complete' ? '✓ Done' : 'In Progress'}
                                </div>
                            )}
                            <div className="step-xp-badge">+{xpAmount} XP</div>
                        </div>
                        <div className="step-expand-icon">▼</div>
                    </div>

                    <div className="step-content">
                        <StepInput
                            step={step}
                            stepState={stepState}
                            onInputChange={(value) => onInputChange(step.id, value, quest)}
                            onComplete={() => onComplete()}
                        />
                    </div>
                </div>
            );
        }

        // ============================================
        // STEP INPUT COMPONENT
        // ============================================

        function StepInput({ step, stepState, onInputChange, onComplete }) {
            const [analysisRunning, setAnalysisRunning] = useState(false);
            const [analysisShown, setAnalysisShown] = useState(false);

            const runAnalysis = useCallback(() => {
                setAnalysisRunning(true);
                setTimeout(() => {
                    setAnalysisRunning(false);
                    setAnalysisShown(true);
                    onComplete();
                }, 1500);
            }, [onComplete]);

            switch (step.type) {
                case 'text_input':
                    return (
                        <div className="step-input-group">
                            <textarea
                                className="step-textarea"
                                placeholder={step.placeholder}
                                value={stepState.value || ''}
                                onChange={e => onInputChange(e.target.value)}
                            />
                            {stepState.value && stepState.value.length >= 10 && !stepState.completed && (
                                <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--green)', fontWeight: 600 }}>
                                    ✓ Ready to complete
                                </div>
                            )}
                        </div>
                    );

                case 'voice_input':
                    return (
                        <div className="step-input-group">
                            <div className="voice-input-container">
                                <button className="voice-btn">🎤</button>
                                <textarea
                                    className="step-textarea"
                                    placeholder={step.placeholder}
                                    value={stepState.value || ''}
                                    onChange={e => onInputChange(e.target.value)}
                                    style={{ paddingRight: '44px' }}
                                />
                            </div>
                            {stepState.value && stepState.value.length >= 10 && !stepState.completed && (
                                <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--green)', fontWeight: 600 }}>
                                    ✓ Ready to complete
                                </div>
                            )}
                        </div>
                    );

                case 'location_input':
                    const [city, state] = (stepState.value || '|').split('|');
                    return (
                        <div className="step-input-group">
                            <div className="location-inputs">
                                <div>
                                    <label className="step-input-label">City</label>
                                    <input
                                        type="text"
                                        className="step-input"
                                        placeholder="e.g., Portland"
                                        value={city || ''}
                                        onChange={e => onInputChange(`${e.target.value}|${state || ''}`)}
                                    />
                                </div>
                                <div>
                                    <label className="step-input-label">State</label>
                                    <select
                                        className="step-select"
                                        value={state || ''}
                                        onChange={e => onInputChange(`${city || ''}|${e.target.value}`)}
                                    >
                                        <option value="">Select state</option>
                                        {['AL', 'AK', 'AZ', 'AR', 'CA', 'CO', 'CT', 'DE', 'FL', 'GA', 'HI', 'ID', 'IL', 'IN', 'IA', 'KS', 'KY', 'LA', 'ME', 'MD', 'MA', 'MI', 'MN', 'MS', 'MO', 'MT', 'NE', 'NV', 'NH', 'NJ', 'NM', 'NY', 'NC', 'ND', 'OH', 'OK', 'OR', 'PA', 'RI', 'SC', 'SD', 'TN', 'TX', 'UT', 'VT', 'VA', 'WA', 'WV', 'WI', 'WY'].map(s => (
                                            <option key={s} value={s}>{s}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>
                            {city && state && !stepState.completed && (
                                <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--green)', fontWeight: 600 }}>
                                    ✓ Ready to complete
                                </div>
                            )}
                        </div>
                    );

                case 'number_input':
                    return (
                        <div className="step-input-group">
                            <label className="step-input-label">{step.unit}</label>
                            <input
                                type="number"
                                className="step-input"
                                placeholder={step.placeholder}
                                value={stepState.value || ''}
                                onChange={e => onInputChange(e.target.value)}
                            />
                            {stepState.value && parseFloat(stepState.value) > 0 && !stepState.completed && (
                                <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--green)', fontWeight: 600 }}>
                                    ✓ Ready to complete
                                </div>
                            )}
                        </div>
                    );

                case 'file_upload':
                    const isFileSelected = !!stepState.value;
                    return (
                        <div className="step-input-group">
                            {!isFileSelected ? (
                                <div
                                    className="file-upload-zone"
                                    onClick={() => {
                                        onInputChange('file_' + Date.now());
                                    }}
                                >
                                    <div className="file-upload-icon">📎</div>
                                    <div className="file-upload-text">Drop files or click to browse</div>
                                    <div className="file-upload-hint">{step.accept}</div>
                                </div>
                            ) : (
                                <div className="file-selected-state">
                                    <div className="file-selected-icon">✓</div>
                                    <div className="file-selected-name">File selected</div>
                                    <button
                                        style={{
                                            marginTop: '12px',
                                            background: 'var(--border)',
                                            border: 'none',
                                            borderRadius: '4px',
                                            padding: '6px 12px',
                                            fontSize: '12px',
                                            cursor: 'pointer',
                                        }}
                                        onClick={() => onInputChange('')}
                                    >
                                        Clear
                                    </button>
                                </div>
                            )}
                        </div>
                    );

                case 'select':
                    return (
                        <div className="step-input-group">
                            <div className="radio-group">
                                {step.options.map(option => (
                                    <label key={option} className="radio-option">
                                        <input
                                            type="radio"
                                            className="radio-input"
                                            name={step.id}
                                            value={option}
                                            checked={stepState.value === option}
                                            onChange={e => onInputChange(e.target.value)}
                                        />
                                        <span className="option-label">{option}</span>
                                    </label>
                                ))}
                            </div>
                        </div>
                    );

                case 'multi_select':
                    const selected = (stepState.value || []);
                    return (
                        <div className="step-input-group">
                            <div className="checkbox-group">
                                {step.options.map(option => (
                                    <label key={option} className="checkbox-option">
                                        <input
                                            type="checkbox"
                                            className="checkbox-input"
                                            checked={selected.includes(option)}
                                            onChange={e => {
                                                const newSelected = e.target.checked
                                                    ? [...selected, option]
                                                    : selected.filter(s => s !== option);
                                                onInputChange(newSelected);
                                            }}
                                        />
                                        <span className="option-label">{option}</span>
                                    </label>
                                ))}
                            </div>
                            {selected.length > 0 && !stepState.completed && (
                                <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--green)', fontWeight: 600 }}>
                                    ✓ Ready to complete
                                </div>
                            )}
                        </div>
                    );

                case 'template_chooser':
                    const selectedTemplates = stepState.value || [];
                    return (
                        <div className="step-input-group">
                            <div className="template-grid">
                                {step.templates.map(template => (
                                    <div
                                        key={template.name}
                                        className={`template-card ${selectedTemplates.includes(template.name) ? 'selected' : ''}`}
                                        onClick={() => {
                                            const newSelected = selectedTemplates.includes(template.name)
                                                ? selectedTemplates.filter(t => t !== template.name)
                                                : [...selectedTemplates, template.name];
                                            onInputChange(newSelected);
                                        }}
                                    >
                                        <div className="template-icon">{template.icon}</div>
                                        <div className="template-name">{template.name}</div>
                                        <div className="template-desc">{template.desc}</div>
                                    </div>
                                ))}
                            </div>
                            {selectedTemplates.length > 0 && !stepState.completed && (
                                <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--green)', fontWeight: 600 }}>
                                    ✓ Ready to complete
                                </div>
                            )}
                        </div>
                    );

                case 'analysis_result':
                    return (
                        <div className="step-input-group">
                            {!analysisRunning && !analysisShown ? (
                                <button className="run-analysis-btn" onClick={runAnalysis}>
                                    Run Analysis
                                </button>
                            ) : analysisRunning ? (
                                <div className="analysis-loading">
                                    <div className="spinner"></div>
                                    <span>Analyzing…</span>
                                </div>
                            ) : (
                                <div className="analysis-result-box">
                                    <div className="analysis-title">{step.analysisTitle}</div>
                                    <div className="analysis-result-text">{step.analysisResult}</div>
                                </div>
                            )}
                        </div>
                    );

                case 'checklist':
                    return (
                        <div className="step-input-group">
                            <div className="checklist-item">
                                <input
                                    type="checkbox"
                                    className="checklist-input"
                                    checked={stepState.value === true}
                                    onChange={e => onInputChange(e.target.checked)}
                                />
                                <label className="checklist-label">{step.label}</label>
                            </div>
                        </div>
                    );

                default:
                    return null;
            }
        }

        // ============================================
        // HOMEPAGE COMPONENT
        // ============================================

        function Homepage({ onStart }) {
            return (
                <div className="homepage">
                    <div className="blueprint-grid"></div>
                    <div className="homepage-content">
                        <div className="homepage-header">
                            <div className="homepage-logo">🏗️</div>
                            <h1 className="homepage-title">BKG Killer App</h1>
                            <p className="homepage-subtitle">
                                Master construction project management in 7 phases. Level up from Scout to Architect.
                            </p>
                        </div>

                        <div className="tool-silhouettes">
                            <div>
                                <div className="tool-icon">🧭</div>
                                <div className="tool-name">Scout</div>
                            </div>
                            <div>
                                <div className="tool-icon">🔒</div>
                                <div className="tool-name">Lock</div>
                            </div>
                            <div>
                                <div className="tool-icon">📐</div>
                                <div className="tool-name">Plan</div>
                            </div>
                            <div>
                                <div className="tool-icon">🔨</div>
                                <div className="tool-name">Build</div>
                            </div>
                            <div>
                                <div className="tool-icon">🔄</div>
                                <div className="tool-name">Adapt</div>
                            </div>
                            <div>
                                <div className="tool-icon">💰</div>
                                <div className="tool-name">Collect</div>
                            </div>
                            <div>
                                <div className="tool-icon">📖</div>
                                <div className="tool-name">Reflect</div>
                            </div>
                        </div>

                        <div className="stats-section">
                            <div className="stat-box">
                                <div className="stat-number">27</div>
                                <div className="stat-label">Quests</div>
                            </div>
                            <div className="stat-box">
                                <div className="stat-number">200+</div>
                                <div className="stat-label">Steps</div>
                            </div>
                            <div className="stat-box">
                                <div className="stat-number">2,195</div>
                                <div className="stat-label">Total XP</div>
                            </div>
                        </div>

                        <button className="cta-button" onClick={onStart}>
                            Start Command Center →
                        </button>
                    </div>
                </div>
            );
        }

        // ============================================
        // RENDER
        // ============================================

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
